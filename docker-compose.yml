# Proxmox Horizon Docker Compose 설정
#
# 주요 특징:
# - Nginx 로그를 로컬에서 관리 (날짜별 로테이션)
# - 앱 로그 및 업로드 파일 로컬 저장
# - 데이터베이스 데이터 영구 저장
# - 설정 변경 시 컨테이너 재시작만으로 반영 가능

services:
  postgres:
    image: postgres:18-alpine
    container_name: proxmox-postgres
    environment:
      POSTGRES_DB: proxmox
      POSTGRES_USER: proxmox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # PostgreSQL 18 on /mnt/* bind mounts can fail chmod/chown during init.
      - postgres_data:/var/lib/postgresql
      # 설정 파일(호스트에서 관리, 컨테이너에 read-only로 마운트)
      - ./servers/postgres/config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./servers/postgres/config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      # 백업 디렉토리 (편의성)
      - ./servers/postgres/backups:/backups
    command: postgres -c config_file=/etc/postgresql/postgresql.conf -c hba_file=/etc/postgresql/pg_hba.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxmox"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [kmnet]
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: proxmox-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      # 데이터 디렉토리 (영구 저장)
      - ./servers/redis/data:/data
      # 설정 파일(호스트에서 관리, 컨테이너에 read-only로 마운트)
      - ./servers/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [kmnet]
    restart: unless-stopped

  app:
    build: ./app
    container_name: proxmox-app
    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      KEY_ENCRYPTION_SECRET: ${KEY_ENCRYPTION_SECRET}
      PORT: ${PORT:-3000}
      BASE_URL: ${BASE_URL}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      # SMTP 설정 (선택사항)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-}
    volumes:
      # 애플리케이션 로그 (로컬에 저장)
      - ./servers/app/logs:/app/logs
      # 업로드 파일 (영구 저장)
      - ./servers/app/uploads:/app/uploads
      # 백업 파일 (영구 저장)
      - ./servers/backups:/app/backups
      # 메뉴 설정 파일 (초기화용)
      - ./config:/config:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [kmnet]
    restart: unless-stopped

  nginx:
    image: nginx:1.28-alpine
    container_name: proxmox-nginx
    volumes:
      # Nginx 설정 파일 (로컬에서 관리)
      - ./servers/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL 인증서 (로컬에서 관리)
      - ./servers/nginx/certs:/etc/nginx/certs:ro
      # 로그 파일 (로컬에 저장 - 날짜별 로테이션용)
      - ./servers/nginx/logs:/var/log/nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on: [app]
    networks: [kmnet]
    restart: unless-stopped

networks:
  kmnet:
    name: proxmox-network
    driver: bridge

volumes:
  postgres_data:

# 볼륨 백업 팁:
# - PostgreSQL: docker compose exec postgres pg_dump -U proxmox -Fc proxmox > backup.dump
# - Redis: docker compose exec redis redis-cli SAVE && cp data/redis/data/dump.rdb backup/
# - 전체: tar czf proxmox-backup-$(date +%Y%m%d).tar.gz data/ .env
