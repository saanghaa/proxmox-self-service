log_format proxmox_audit
    '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    'host="$host" real_ip="$http_x_real_ip" xff="$http_x_forwarded_for" '
    'ref="$http_referer" ua="$http_user_agent"';

server {
    listen 80;
    server_name _;

    # 1. 보안 헤더 설정 (SRE 표준)
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    # 업로드 제한 (SSH 키 파일 및 백업 대비)
    client_max_body_size 10m;

    # 2. 로깅 설정 (트러블슈팅용)
    access_log /var/log/nginx/access.log proxmox_audit;
    error_log /var/log/nginx/error.log warn;

    location / {
        # Docker Compose의 서비스명 'app'을 사용합니다.
        proxy_pass http://app:3000;

        # 3. 세션 유지를 위한 핵심 프록시 헤더
        # 이 설정들이 있어야 Express의 'trust proxy'와 연동되어 세션 쿠키가 보존됩니다.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 4. Web소켓 지원 (Proxmox 콘솔 및 실시간 상태 업데이트용)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 5. 타임아웃 및 버퍼 최적화
        # 긴 작업(VM 생성, 키 배포) 시 연결 끊김 방지
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 6. 에러 페이지 처리
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
